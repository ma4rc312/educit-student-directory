<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio EDUCIT</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .user-card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .user-card:last-child { border-bottom: none; }
        
        /* Bug 1: El botón no toma los estilos por un error tipográfico */
        .btn-primary { 
            background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px;
        }

        .search-input {
            width: 100%; padding: 9px 12px; margin-bottom: 16px;
            border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Directorio de Estudiantes EDUCIT</h2>
    
    <button class="btn-primary" onclick="loadUsers()">Cargar Usuarios</button>
    
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Buscar por nombre..."
        oninput="handleSearch(this.value)"
        aria-label="Buscar usuario por nombre"
    />

    <div id="userList">Los usuarios aparecerán aquí...</div>
</div>

<script>
    // Tarea 3 (Lógica SQL): Corrige esta consulta para insertar un usuario.
    // Consulta actual: INSERT INTO estudiantes (nombre, correo) VALUES (userName);
    // Tu corrección: 
    // INSERT INTO estudiantes (nombre, correo) VALUES (?, ?);

  let allUsers = [];

    function loadUsers() {
        const userList = document.getElementById('userList');
        userList.innerHTML = 'Cargando...';

        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(users => {

                allUsers = users; //llena la variable GLOBAL
                document.getElementById('searchInput').style.display = 'block';

                userList.innerHTML = '';
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    
                    // Bug 2: Los datos no se muestran correctamente. Revisa las propiedades del objeto 'user'.
                    div.innerHTML = `<strong>${user.name}</strong> - ${user.email}`; 
                    
                    userList.appendChild(div);
                });
            })
            .catch(error => {
                userList.innerHTML = 'Error al cargar los usuarios.';
                console.error(error);
            });
    }

      function handleSearch(query) {
        // allUsers ya tiene los datos porque loadUsers la lleno
        const term = query.trim().toLowerCase();
        const filtered = term
            ? allUsers.filter(u => u.name.toLowerCase().includes(term))
            : allUsers;

        const userList = document.getElementById('userList');
        userList.innerHTML = '';

        if (filtered.length === 0) {
            userList.innerHTML = '<p style="color:#888">No se encontraron usuarios.</p>';
            return;
        }

        filtered.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `<strong>${user.name}</strong> - ${user.email}`;
            userList.appendChild(div);
        });
    }
</script>

</body>
</html>
